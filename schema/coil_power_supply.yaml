---
kind: System
name: CoilPowerSupply
version: 0
description: |
  A power supply driving a coil to generate a magnetic field.

  The primary user-facing module is ``field``, which represents the magnetic
  field in Tesla.  An optional ``current`` module exposes the raw coil current
  for advanced or expert use; when present, ``controlled_by`` indicates whether
  ``field`` or the user is driving the current setpoint.

modules:
  field:
    definition: Drivable:1
    description: |
      Magnetic field generated by the coil.
    parameters:
      - value:
          definition: value:1
          datainfo:
            type: double
            unit: T
      - target:
          definition: target:1
          datainfo:
            type: double
            unit: T
      - mode:
          description: |
            Operating mode of the coil powersupply.
          datainfo:
            type: enum
            members:
              DISABLED: 0
              DRIVEN: 1
              PERSISTENT: 2
          readonly: false
          optional: true
      - ramp:
          definition: ramp:1
          description: Field ramp rate in T/min.
          datainfo:
            type: double
            unit: T/min
          optional: true

  current:
    definition: Drivable:1
    description: |
      Current through the coil.  In normal operation this is driven by the
      ``field`` module
    optional: true
    parameters:
      - value:
          definition: value:1
          datainfo:
            type: double
            unit: A
      - target:
          definition: target:1
          datainfo:
            type: double
            unit: A
      - ramp:
          definition: ramp:1
          description: Current ramp rate in A/min.
          datainfo:
            type: double
            unit: A/min
          optional: true
      - controlled_by:
          definition: controlled_by:1
          description: |
            Which module is currently providing the current setpoint.
          datainfo:
            type: enum
            members:
              self: 0
              field: 1
